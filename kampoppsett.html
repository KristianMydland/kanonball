<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Kampoppsett – Lauvåsen IF</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="header">
    <img src="lauvasen_logo.png" style="height:70px;">
    <h1>Kampoppsett – Lagret oppsett</h1>
    <button id="darkToggle" class="dark-toggle secondary">Dark mode</button>
  </div>

  <div class="results">
    <p id="scheduleSourceStatus"></p>
    <div id="scheduleContainer"></div>
  </div>

  <div class="results">
    <div id="breakSummaryContainer"></div>
  </div>

  <script src="script.js"></script>
  <script>
    initDarkMode();

    (async () => {
      const loaded = await loadSharedScheduleWithSource();
      const sourceStatusEl = document.getElementById("scheduleSourceStatus");

      if (!loaded) {
        sourceStatusEl.textContent = "Kilde: ingen data";
        document.getElementById("scheduleContainer").innerHTML =
          "<p>Ingen lagret kampoppsett funnet.</p>";
        return;
      }

      const sourceLabelMap = {
        github: "GitHub",
        "local-file": "lokal fil (kampoppsett.json)",
        "local-cache": "lokal cache"
      };
      const savedAtText = formatSavedAt(loaded.payload?.savedAt);
      const revisionText = formatRevision(getPayloadRevision(loaded.payload));
      sourceStatusEl.textContent =
        `Kilde: ${sourceLabelMap[loaded.source] || loaded.source} | Lagret: ${savedAtText} | Revisjon: ${revisionText}`;

      const saved = loaded.payload;
      const { schedule, teams } = saved;

      let html = "<table><thead><tr>" +
        "<th>Runde</th><th>Start</th><th>Slutt</th><th>Bane</th><th>Lag A</th><th>Lag B</th>" +
        "</tr></thead><tbody>";

      schedule.forEach(slot => {
        slot.matches.forEach(m => {
          const colorA = teamColors[teams.indexOf(m.teamA) % teamColors.length];
          const colorB = teamColors[teams.indexOf(m.teamB) % teamColors.length];

          html += `
            <tr>
              <td>${slot.round}</td>
              <td>${minutesToTimeStr(slot.start)}</td>
              <td>${minutesToTimeStr(slot.end)}</td>
              <td class="court-${m.court}">${m.court}</td>
              <td><span class="team-tag" style="background:${colorA}">${m.teamA}</span></td>
              <td><span class="team-tag" style="background:${colorB}">${m.teamB}</span></td>
            </tr>
          `;
        });
      });

      html += "</tbody></table>";
      document.getElementById("scheduleContainer").innerHTML = html;

      // --- Første og siste kamp + lengste pause per lag ---
      const teamMatches = new Map();
      teams.forEach(team => teamMatches.set(team, []));

      schedule.forEach(slot => {
        slot.matches.forEach(match => {
          teamMatches.get(match.teamA)?.push({ start: slot.start, end: slot.end });
          teamMatches.get(match.teamB)?.push({ start: slot.start, end: slot.end });
        });
      });

      let breakHtml = "<h3>Første og siste kamp + lengste pause per lag</h3>";
      breakHtml += "<table><thead><tr>" +
        "<th>Lag</th><th>Første kamp</th><th>Siste kamp</th><th>Lengste pause</th><th>Fra</th><th>Til</th>" +
        "</tr></thead><tbody>";

      teams.forEach(team => {
        const matches = teamMatches.get(team) || [];
        let longestBreak = null;

        for (let i = 1; i < matches.length; i++) {
          const prev = matches[i - 1];
          const current = matches[i];
          const breakMinutes = current.start - prev.end;
          if (!longestBreak || breakMinutes > longestBreak.minutes) {
            longestBreak = { minutes: breakMinutes, from: prev.end, to: current.start };
          }
        }

        const firstMatch = matches.length > 0 ? minutesToTimeStr(matches[0].start) : "-";
        const lastMatch  = matches.length > 0 ? minutesToTimeStr(matches[matches.length - 1].start) : "-";

        breakHtml += `
          <tr>
            <td>${team}</td>
            <td>${firstMatch}</td>
            <td>${lastMatch}</td>
            <td>${longestBreak ? `${longestBreak.minutes} min` : "Ikke relevant"}</td>
            <td>${longestBreak ? minutesToTimeStr(longestBreak.from) : "-"}</td>
            <td>${longestBreak ? minutesToTimeStr(longestBreak.to) : "-"}</td>
          </tr>
        `;
      });

      breakHtml += "</tbody></table>";
      document.getElementById("breakSummaryContainer").innerHTML = breakHtml;
    })();
  </script>
</body>
</html>
