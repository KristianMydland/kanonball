<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Logg inn</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="config">
    <h2>Administrator – Logg inn</h2>

    <label for="password">Passord</label>
    <input type="password" id="password">

    <button id="loginBtn">Logg inn</button>
    <p id="msg" style="color:red;"></p>
  </div>

  <script>
    const DEFAULT_HASH = "-4f1c2a5e"; // hash av "kanonball2026"

    function hash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = (h << 5) - h + str.charCodeAt(i);
        h |= 0;
      }
      return h.toString(16);
    }

    document.getElementById("loginBtn").addEventListener("click", () => {
      const pw = document.getElementById("password").value;
      const stored = localStorage.getItem("admin_pw") || DEFAULT_HASH;

      if (hash(pw) === stored) {
        localStorage.setItem("is_admin", "true");
        window.location.href = "index.html";
      } else {
        document.getElementById("msg").textContent = "Feil passord.";
      }
    });
  </script>
</body>
</html>
