<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Logg inn</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="config">
    <h2>Administrator – Logg inn</h2>

    <label for="password">Passord</label>
    <input type="password" id="password">

    <button id="loginBtn">Logg inn</button>
    <p id="msg" style="color:red;"></p>
    <button id="guestBtn" style="margin-top:10px;">Fortsett uten innlogging</button>
    <p id="msg" style="color:red;"></p>

  </div>

  <script>
    // RIKTIG HASH for "kanonball2026" const DEFAULT_HASH = "-4f1c2a5e";
    // RIKTIG HASH for "KB2026" 
    const DEFAULT_HASH = "-7c4b0527";
    function hash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = (h << 5) - h + str.charCodeAt(i);
        h |= 0;
      }
      return h.toString(16);
    }
    document.getElementById("loginBtn").addEventListener("click", () => {
    document.getElementById("guestBtn").addEventListener("click", () => {
      // Sørg for at man IKKE er admin
      localStorage.removeItem("is_admin");
      window.location.href = "index.html";
      const pw = document.getElementById("password").value;

      // BRUK KUN DEFAULT_HASH — LocalStorage kan ikke ødelegge passordet lenger
      const stored = DEFAULT_HASH;

      if (hash(pw) === stored) {
        localStorage.setItem("is_admin", "true");
        window.location.href = "index.html";
      } else {
        document.getElementById("msg").textContent = "Feil passord.";
      }
    });
  </script>
</body>
</html>
