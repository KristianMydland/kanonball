<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Kampgenerator – Lauvåsen IF</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <script src="script.js"></script>

  <div class="header">
    <img src="lauvasen_logo.png" style="height:70px;">
    <h1>Kampgenerator – Lauvåsen IF Kanonballturnering 2026</h1>
    <button id="logoutBtn" onclick="logout()" class="secondary" style="display:none;">Logg ut</button>
    <button id="adminLoginBtn" style="display:block;">Logg inn som administrator</button>

<div id="adminLoginBox" style="display:none; margin-top:10px;">
  <input type="password" id="adminPassword" placeholder="Passord">
  <button id="adminSubmitBtn">Logg inn</button>
  <p id="adminMsg" style="color:red;"></p>
</div>

    <button id="darkToggle" class="dark-toggle secondary">Dark mode</button>
  </div>

  <div class="config">
    <h2>Oppsett</h2>

    <label>Antall lag</label>
    <select id="numTeams" class="adminOnly">
      <option>5</option><option>6</option><option>7</option>
      <option>8</option><option>9</option><option>10</option>
    </select>

    <label>Antall baner</label>
    <select id="numCourts" class="adminOnly">
      <option value="1">1 bane</option>
      <option value="2">2 baner</option>
    </select>

    <label>Kamp-lengde (min)</label>
    <input id="matchMinutes" type="number" value="5" class="adminOnly">

    <label>Pause (min)</label>
    <input id="breakMinutes" type="number" value="1" class="adminOnly">

    <label>Pause mellom kamper (min)</label>
    <input id="breakBetweenMatches" type="number" value="0" class="adminOnly">

    <label>Starttid</label>
    <input id="startTime" type="time" value="18:00" class="adminOnly">

    <h3>Lagnavn</h3>
    <div id="teamNames"></div>

    <button id="generateBtn" class="adminAction">Generer kampoppsett</button>

    <button id="saveScheduleBtn" class="adminAction secondary">Lagre kampoppsett til fil (JSON)</button>
    <button id="saveHTMLBtn" class="adminAction secondary">Lagre kampoppsett som HTML</button>

    <button onclick="importScheduleFromFile()" class="adminAction secondary">
      Importer kampoppsett fra fil (JSON)
    </button>

    <button onclick="importResultsFromFile()" class="adminAction secondary">
      Importer resultater fra fil (JSON)
    </button>

    <br><br>
    <button onclick="window.open('kampoppsett.html','_blank')" class="secondary">
      Åpne lagret kampoppsett
    </button>

    <button onclick="window.open('resultater.html','_blank')" class="secondary">
      Åpne resultater
    </button>
  </div>
  <div class="results">
    <h2>Kampoppsett</h2>
    <div id="scheduleContainer"></div>
  </div>

  <script>
    initDarkMode();
    loadResults();
    updateAdminVisibility();
    const numTeamsSelect = document.getElementById("numTeams");
    const teamNamesDiv = document.getElementById("teamNames");

    function renderTeamInputs() {
      const n = parseInt(numTeamsSelect.value);
      teamNamesDiv.innerHTML = "";
      for (let i = 1; i <= n; i++) {
        const inp = document.createElement("input");
        inp.type = "text";
        inp.id = "team_" + i;
        inp.value = "Lag " + i;
        inp.className = "adminOnly";
        teamNamesDiv.appendChild(inp);
      }
      updateAdminVisibility();
    }
    numTeamsSelect.addEventListener("change", renderTeamInputs);
    renderTeamInputs();

    document.getElementById("generateBtn").addEventListener("click", () => {
      const n = parseInt(numTeamsSelect.value);
      const numCourts = parseInt(document.getElementById("numCourts").value);
      const matchMinutes = parseInt(document.getElementById("matchMinutes").value);
      const breakMinutes = parseInt(document.getElementById("breakMinutes").value);
      const breakBetweenMatches = parseInt(document.getElementById("breakBetweenMatches").value) || 0;
      const startTime = document.getElementById("startTime").value || "18:00";

      const teams = [];
      for (let i = 1; i <= n; i++) {
        teams.push(document.getElementById("team_" + i).value.trim() || ("Lag " + i));
      }

      const { schedule } = buildSchedule(
        teams, numCourts, matchMinutes, breakMinutes, startTime, breakBetweenMatches
      );

      lastSchedule = { schedule, teams };
      saveSchedule(schedule, teams);

      let html = "<table><thead><tr>" +
        "<th>Runde</th><th>Start</th><th>Slutt</th><th>Bane</th><th>Lag A</th><th>Lag B</th>" +
        "</tr></thead><tbody>";

      schedule.forEach(slot => {
        slot.matches.forEach(m => {
          const colorA = teamColors[teams.indexOf(m.teamA) % teamColors.length];
          const colorB = teamColors[teams.indexOf(m.teamB) % teamColors.length];

          html += `
            <tr>
              <td>${slot.round}</td>
              <td>${minutesToTimeStr(slot.start)}</td>
              <td>${minutesToTimeStr(slot.end)}</td>
              <td class="court-${m.court}">${m.court}</td>
              <td><span class="team-tag" style="background:${colorA}">${m.teamA}</span></td>
              <td><span class="team-tag" style="background:${colorB}">${m.teamB}</span></td>
            </tr>
          `;
        });
      });

      html += "</tbody></table>";
      document.getElementById("scheduleContainer").innerHTML = html;
    });

    document.getElementById("saveScheduleBtn").addEventListener("click", async () => {
      const saved = await loadScheduleWithFallback();
      if (!saved) return alert("Ingen kampoppsett å lagre.");
      downloadJSON("kampoppsett.json", saved);
    });

    document.getElementById("saveHTMLBtn").addEventListener("click", () => {
      if (!lastSchedule) return alert("Generer kampoppsett først.");
      const html = document.getElementById("scheduleContainer").innerHTML;
      downloadHTML("kampoppsett.html", html);
    });
  // Hash for passordet KB2026
  const DEFAULT_HASH = "-7c4b0527";

  function hash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = (h << 5) - h + str.charCodeAt(i);
      h |= 0;
    }
    return h.toString(16);
  }

  // Vis/skjul login-boks
  document.getElementById("adminLoginBtn").addEventListener("click", () => {
    const box = document.getElementById("adminLoginBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
  });

  // Logg inn
  document.getElementById("adminSubmitBtn").addEventListener("click", () => {
    const pw = document.getElementById("adminPassword").value;

    if (hash(pw) === DEFAULT_HASH) {
      localStorage.setItem("is_admin", "true");
      document.getElementById("adminMsg").style.color = "green";
      document.getElementById("adminMsg").textContent = "Innlogging vellykket";

      // Oppdater UI umiddelbar og reload siden
      updateAdminVisibility();
      setTimeout(() => location.reload(), 500);
    } else {
      document.getElementById("adminMsg").textContent = "Feil passord.";
    }
  });
</script>

</body>
</html>
