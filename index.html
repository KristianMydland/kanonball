<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Kampgenerator – Lauvåsen IF</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <script src="script.js"></script>

  <div class="header">
    <img src="lauvasen_logo.png" style="height:70px;">
    <h1>Kampgenerator – Lauvåsen IF Kanonballturnering 2026</h1>
    <button id="logoutBtn" onclick="logout()" class="secondary" style="display:none;">Logg ut</button>
    <button id="adminLoginBtn" style="display:block;">Logg inn som administrator</button>

<div id="adminLoginBox" style="display:none; margin-top:10px;">
  <input type="password" id="adminPassword" placeholder="Passord">
  <button id="adminSubmitBtn">Logg inn</button>
  <p id="adminMsg" style="color:red;"></p>
</div>

    <button id="darkToggle" class="dark-toggle secondary">Dark mode</button>
  </div>

  <div class="config">
    <h2>Oppsett</h2>

    <label>Antall lag</label>
    <div class="counter-control">
      <button id="numTeamsMinus" type="button" class="adminAction secondary">-</button>
      <input id="numTeams" type="number" value="5" min="2" max="30" readonly class="adminOnly counter-value">
      <button id="numTeamsPlus" type="button" class="adminAction secondary">+</button>
    </div>

    <label>Antall baner</label>
    <div class="counter-control">
      <button id="numCourtsMinus" type="button" class="adminAction secondary">-</button>
      <input id="numCourts" type="number" value="2" min="1" max="10" readonly class="adminOnly counter-value">
      <button id="numCourtsPlus" type="button" class="adminAction secondary">+</button>
    </div>

    <label>Kamp-lengde (min)</label>
    <input id="matchMinutes" type="number" value="5" class="adminOnly">

    <label>Pause (min)</label>
    <input id="breakMinutes" type="number" value="1" class="adminOnly">

    <label>Pause mellom kamper (min)</label>
    <input id="breakBetweenMatches" type="number" value="0" class="adminOnly">

    <label>Starttid</label>
    <input id="startTime" type="time" value="18:00" class="adminOnly">

    <h3>Lagnavn</h3>
    <div id="teamNames"></div>

    <button id="generateBtn" class="adminAction">Generer kampoppsett</button>

    <button id="saveScheduleBtn" class="adminAction secondary">Lagre kampoppsett til fil (JSON)</button>
    <button id="saveHTMLBtn" class="adminAction secondary">Lagre kampoppsett som HTML</button>

    <button onclick="importScheduleFromFile()" class="adminAction secondary">
      Importer kampoppsett fra fil (JSON)
    </button>

    <button onclick="importResultsFromFile()" class="adminAction secondary">
      Importer resultater fra fil (JSON)
    </button>

    <button id="openPublishModalBtn" class="adminAction secondary">Publiser kampoppsett til GitHub</button>

    <br><br>
    <button onclick="window.open('kampoppsett.html','_blank')" class="secondary">
      Åpne lagret kampoppsett
    </button>

    <button onclick="window.open('resultater.html','_blank')" class="secondary">
      Åpne resultater
    </button>
  </div>

  <div id="publishModalOverlay" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header-row">
        <h3>Publiser kampoppsett til GitHub</h3>
        <button id="closePublishModalBtn" type="button" class="secondary">Lukk</button>
      </div>

      <label>GitHub owner</label>
      <input id="ghOwner" type="text" placeholder="f.eks. brukernavn" class="adminOnly">

      <label>GitHub repo</label>
      <input id="ghRepo" type="text" placeholder="f.eks. Kanonball_Generator" class="adminOnly">

      <label>Branch</label>
      <input id="ghBranch" type="text" value="main" class="adminOnly">

      <label>Filsti i repo</label>
      <input id="ghPath" type="text" value="kampoppsett.json" class="adminOnly">

      <label>GitHub token (kan lagres lokalt - usikkert)</label>
      <input id="ghToken" type="password" placeholder="Fine-grained token med Contents: write" class="adminOnly">
      <label>
        <input id="ghRememberToken" type="checkbox" class="adminOnly"> Husk token i nettleseren (usikkert)
      </label>

      <button id="publishGitHubBtn" class="adminAction secondary">Publiser til GitHub</button>
      <button id="clearGitHubTokenBtn" class="adminAction secondary">Slett lagret token</button>
      <p id="publishGitHubMsg"></p>
    </div>
  </div>

  <div class="results">
    <h2>Kampoppsett</h2>
    <div id="scheduleContainer"></div>
  </div>

  <script>
    initDarkMode();
    loadResults();
    updateAdminVisibility();
    const numTeamsInput = document.getElementById("numTeams");
    const numCourtsInput = document.getElementById("numCourts");
    const numTeamsMinusBtn = document.getElementById("numTeamsMinus");
    const numTeamsPlusBtn = document.getElementById("numTeamsPlus");
    const numCourtsMinusBtn = document.getElementById("numCourtsMinus");
    const numCourtsPlusBtn = document.getElementById("numCourtsPlus");
    const openPublishModalBtn = document.getElementById("openPublishModalBtn");
    const closePublishModalBtn = document.getElementById("closePublishModalBtn");
    const publishModalOverlay = document.getElementById("publishModalOverlay");
    const teamNamesDiv = document.getElementById("teamNames");
    let teamNamesMemory = [];

    function adjustCounter(inputEl, delta) {
      const min = parseInt(inputEl.min || "1", 10);
      const max = parseInt(inputEl.max || "999", 10);
      const current = parseInt(inputEl.value || String(min), 10);
      const next = Math.max(min, Math.min(max, current + delta));
      inputEl.value = String(next);
      return next;
    }

    function renderTeamInputs() {
      const n = parseInt(numTeamsInput.value, 10);
      teamNamesDiv.innerHTML = "";
      for (let i = 1; i <= n; i++) {
        const row = document.createElement("div");
        row.className = "team-row";

        const inp = document.createElement("input");
        inp.type = "text";
        inp.id = "team_" + i;
        inp.value = teamNamesMemory[i - 1] || ("Lag " + i);
        inp.className = "adminOnly";

        const delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.textContent = "x";
        delBtn.className = "adminAction secondary delete-team-btn";
        delBtn.dataset.index = String(i - 1);

        row.appendChild(inp);
        row.appendChild(delBtn);
        teamNamesDiv.appendChild(row);
      }
      updateAdminVisibility();
    }

    function rememberCurrentTeamNames() {
      const n = parseInt(numTeamsInput.value, 10);
      const next = [];

      for (let i = 1; i <= n; i++) {
        const input = document.getElementById("team_" + i);
        if (input) {
          next.push(input.value);
        } else {
          next.push(teamNamesMemory[i - 1] || ("Lag " + i));
        }
      }

      teamNamesMemory = next;
    }

    function renderScheduleTable(schedule, teams) {
      let html = "<table><thead><tr>" +
        "<th>Runde</th><th>Start</th><th>Slutt</th><th>Bane</th><th>Lag A</th><th>Lag B</th>" +
        "</tr></thead><tbody>";

      schedule.forEach(slot => {
        slot.matches.forEach(m => {
          const colorA = teamColors[teams.indexOf(m.teamA) % teamColors.length];
          const colorB = teamColors[teams.indexOf(m.teamB) % teamColors.length];

          html += `
            <tr>
              <td>${slot.round}</td>
              <td>${minutesToTimeStr(slot.start)}</td>
              <td>${minutesToTimeStr(slot.end)}</td>
              <td class="court-${m.court}">${m.court}</td>
              <td><span class="team-tag" style="background:${colorA}">${m.teamA}</span></td>
              <td><span class="team-tag" style="background:${colorB}">${m.teamB}</span></td>
            </tr>
          `;
        });
      });

      html += "</tbody></table>";
      document.getElementById("scheduleContainer").innerHTML = html;
    }

    function applyScheduleToIndex(data) {
      if (!data || !Array.isArray(data.schedule) || !Array.isArray(data.teams)) return;

      const teams = data.teams;
      const schedule = data.schedule;

      const minTeams = parseInt(numTeamsInput.min || "2", 10);
      const maxTeams = parseInt(numTeamsInput.max || "30", 10);
      const safeTeamCount = Math.max(minTeams, Math.min(maxTeams, teams.length));
      numTeamsInput.value = String(safeTeamCount);
      teamNamesMemory = teams.slice(0, safeTeamCount);

      renderTeamInputs();

      teams.forEach((teamName, idx) => {
        const input = document.getElementById("team_" + (idx + 1));
        if (input) input.value = teamName;
      });

      lastSchedule = { schedule, teams };
      renderScheduleTable(schedule, teams);
    }

    window.handleScheduleImported = applyScheduleToIndex;

    openPublishModalBtn.addEventListener("click", () => {
      publishModalOverlay.classList.add("open");
    });

    closePublishModalBtn.addEventListener("click", () => {
      publishModalOverlay.classList.remove("open");
    });

    publishModalOverlay.addEventListener("click", e => {
      if (e.target === publishModalOverlay) {
        publishModalOverlay.classList.remove("open");
      }
    });

    numTeamsMinusBtn.addEventListener("click", () => {
      rememberCurrentTeamNames();
      adjustCounter(numTeamsInput, -1);
      renderTeamInputs();
    });

    numTeamsPlusBtn.addEventListener("click", () => {
      rememberCurrentTeamNames();
      adjustCounter(numTeamsInput, 1);
      renderTeamInputs();
    });

    teamNamesDiv.addEventListener("input", () => {
      rememberCurrentTeamNames();
    });

    teamNamesDiv.addEventListener("click", e => {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;
      if (!target.classList.contains("delete-team-btn")) return;
      if (!isAdmin()) return;

      rememberCurrentTeamNames();

      const idx = parseInt(target.dataset.index || "-1", 10);
      if (idx < 0 || idx >= teamNamesMemory.length) return;

      const minTeams = parseInt(numTeamsInput.min || "2", 10);
      if (teamNamesMemory.length <= minTeams) return;

      teamNamesMemory.splice(idx, 1);
      numTeamsInput.value = String(teamNamesMemory.length);
      renderTeamInputs();
    });

    numCourtsMinusBtn.addEventListener("click", () => {
      adjustCounter(numCourtsInput, -1);
    });

    numCourtsPlusBtn.addEventListener("click", () => {
      adjustCounter(numCourtsInput, 1);
    });

    renderTeamInputs();

    loadScheduleWithFallback().then(saved => {
      if (saved) applyScheduleToIndex(saved);
    });

    document.getElementById("generateBtn").addEventListener("click", () => {
      const n = parseInt(numTeamsInput.value, 10);
      const numCourts = parseInt(numCourtsInput.value, 10);
      const matchMinutes = parseInt(document.getElementById("matchMinutes").value);
      const breakMinutes = parseInt(document.getElementById("breakMinutes").value);
      const breakBetweenMatches = parseInt(document.getElementById("breakBetweenMatches").value) || 0;
      const startTime = document.getElementById("startTime").value || "18:00";

      const teams = [];
      for (let i = 1; i <= n; i++) {
        teams.push(document.getElementById("team_" + i).value.trim() || ("Lag " + i));
      }

      const { schedule } = buildSchedule(
        teams, numCourts, matchMinutes, breakMinutes, startTime, breakBetweenMatches
      );

      lastSchedule = { schedule, teams };
      saveSchedule(schedule, teams);

      renderScheduleTable(schedule, teams);
    });

    document.getElementById("saveScheduleBtn").addEventListener("click", async () => {
      const saved = await loadScheduleWithFallback();
      if (!saved) return alert("Ingen kampoppsett å lagre.");
      downloadJSON("kampoppsett.json", saved);
    });

    document.getElementById("saveHTMLBtn").addEventListener("click", () => {
      if (!lastSchedule) return alert("Generer kampoppsett først.");
      const html = document.getElementById("scheduleContainer").innerHTML;
      downloadHTML("kampoppsett.html", html);
    });

    const ghOwnerInput = document.getElementById("ghOwner");
    const ghRepoInput = document.getElementById("ghRepo");
    const ghBranchInput = document.getElementById("ghBranch");
    const ghPathInput = document.getElementById("ghPath");
    const ghTokenInput = document.getElementById("ghToken");
    const ghRememberTokenInput = document.getElementById("ghRememberToken");
    const publishGitHubBtn = document.getElementById("publishGitHubBtn");
    const clearGitHubTokenBtn = document.getElementById("clearGitHubTokenBtn");
    const publishGitHubMsg = document.getElementById("publishGitHubMsg");

    const savedGitHubPublishConfig = JSON.parse(localStorage.getItem("kanonball_github_publish_config") || "null");
    const savedGitHubToken = localStorage.getItem("kanonball_github_publish_token") || "";

    if (savedGitHubPublishConfig) {
      ghOwnerInput.value = savedGitHubPublishConfig.owner || "";
      ghRepoInput.value = savedGitHubPublishConfig.repo || "";
      ghBranchInput.value = savedGitHubPublishConfig.branch || "main";
      ghPathInput.value = savedGitHubPublishConfig.path || "kampoppsett.json";
    }

    if (savedGitHubToken) {
      ghTokenInput.value = savedGitHubToken;
      ghRememberTokenInput.checked = true;
    }

    publishGitHubBtn.addEventListener("click", async () => {
      const payload = await loadScheduleWithFallback();
      if (!payload) {
        publishGitHubMsg.style.color = "#c00";
        publishGitHubMsg.textContent = "Ingen kampoppsett å publisere.";
        return;
      }

      const config = {
        owner: ghOwnerInput.value.trim(),
        repo: ghRepoInput.value.trim(),
        branch: ghBranchInput.value.trim() || "main",
        path: ghPathInput.value.trim() || "kampoppsett.json"
      };

      const token = ghTokenInput.value.trim();
      if (!token) {
        publishGitHubMsg.style.color = "#c00";
        publishGitHubMsg.textContent = "Skriv inn GitHub token for publisering.";
        return;
      }

      publishGitHubBtn.disabled = true;
      publishGitHubMsg.style.color = "#666";
      publishGitHubMsg.textContent = "Publiserer til GitHub...";

      try {
        await publishScheduleToGitHub(payload, config, token);

        localStorage.setItem("kanonball_github_publish_config", JSON.stringify(config));
        if (ghRememberTokenInput.checked) {
          localStorage.setItem("kanonball_github_publish_token", token);
        } else {
          localStorage.removeItem("kanonball_github_publish_token");
          ghTokenInput.value = "";
        }

        publishGitHubMsg.style.color = "green";
        publishGitHubMsg.textContent = `Publisert til ${config.owner}/${config.repo}:${config.path}`;
      } catch (err) {
        publishGitHubMsg.style.color = "#c00";
        publishGitHubMsg.textContent = err instanceof Error ? err.message : "Ukjent feil ved publisering.";
      } finally {
        publishGitHubBtn.disabled = false;
        updateAdminVisibility();
      }
    });

    clearGitHubTokenBtn.addEventListener("click", () => {
      localStorage.removeItem("kanonball_github_publish_token");
      ghTokenInput.value = "";
      ghRememberTokenInput.checked = false;
      publishGitHubMsg.style.color = "#666";
      publishGitHubMsg.textContent = "Lagret GitHub-token slettet.";
    });

  // Hash for passordet KB2026
  const DEFAULT_HASH = "-7c4b0527";

  function hash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = (h << 5) - h + str.charCodeAt(i);
      h |= 0;
    }
    return h.toString(16);
  }

  // Vis/skjul login-boks
  document.getElementById("adminLoginBtn").addEventListener("click", () => {
    const box = document.getElementById("adminLoginBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
  });

  // Logg inn
  document.getElementById("adminSubmitBtn").addEventListener("click", () => {
    const pw = document.getElementById("adminPassword").value;

    if (hash(pw) === DEFAULT_HASH) {
      localStorage.setItem("is_admin", "true");
      document.getElementById("adminMsg").style.color = "green";
      document.getElementById("adminMsg").textContent = "Innlogging vellykket";

      // Oppdater UI umiddelbar og reload siden
      updateAdminVisibility();
      setTimeout(() => location.reload(), 500);
    } else {
      document.getElementById("adminMsg").textContent = "Feil passord.";
    }
  });
</script>

</body>
</html>
