<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Resultater – Lauvåsen IF</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <script src="script.js"></script>

  <div class="header">
    <img src="lauvasen_logo.png" style="height:70px;">
    <h1>Resultater – Lauvåsen IF Kanonballturnering 2026</h1>
    <button id="logoutBtn" onclick="logout()" class="secondary" style="display:none;">Logg ut</button>
    <button id="adminLoginBtn" style="display:none;">Logg inn som administrator</button>

    <div id="adminLoginBox" style="display:none; margin-top:10px;">
      <input type="password" id="adminPassword" placeholder="Passord">
      <button id="adminSubmitBtn">Logg inn</button>
      <p id="adminMsg" style="color:red;"></p>
    </div>

    <button id="darkToggle" class="dark-toggle secondary">Dark mode</button>
  </div>

  <div class="results">
    <h2>Kampresultater</h2>
    <div id="liveSourceBanner" class="live-source-banner" style="display:none;"></div>
    <div id="resultsContainer"></div>

    <button id="saveResultsBtn" class="adminAction secondary">Lagre resultater til fil (JSON)</button>
    <button id="saveResultsGitHubBtn" class="adminAction secondary">Lagre resultater til GitHub</button>
    <p id="saveResultsGitHubMsg"></p>

    <button onclick="importResultsFromFile()" class="adminAction secondary">
      Importer resultater fra fil (JSON)
    </button>

    <button onclick="importScheduleFromFile()" class="adminAction secondary">
      Importer kampoppsett fra fil (JSON)
    </button>

    <button id="resetAllBtn" class="adminAction secondary" style="background:#ffdddd; color:#900;">
      Nullstill ALLE resultater
    </button>
  </div>

  <div class="results">
    <h2>Poengtabell</h2>

    <label for="sortStandings">Sorter etter:</label>
    <select id="sortStandings">
      <option value="points">Poeng</option>
      <option value="played">Kamper</option>
      <option value="team">Lag (A–Å)</option>
    </select>

    <div id="standingsContainer"></div>
  </div>

  <script>
    initDarkMode();
    initAdminLogin();
    updateAdminVisibility();

    (async () => {
      await loadSharedResultsWithFallback();

      const saved = await loadSharedScheduleWithFallback();
      if (!saved) {
        document.getElementById("resultsContainer").innerHTML =
          "<p>Ingen lagret kampoppsett funnet. Generer kampoppsett først.</p>";
        return;
      }

      const { schedule, teams } = saved;
      lastSchedule = { schedule, teams };
      renderLiveSourceBanner("liveSourceBanner");

      let html = `
        <table>
          <thead>
            <tr>
              <th>Runde</th>
              <th>Start</th>
              <th>Slutt</th>
              <th>Bane</th>
              <th>Lag A</th>
              <th>Lag B</th>
              <th>Resultat</th>
            </tr>
          </thead>
          <tbody>
      `;

      schedule.forEach(slot => {
        slot.matches.forEach(m => {
          const id = `${slot.round}|${m.teamA}|${m.teamB}`;
          const r = matchResults[id] || { scoreA: "", scoreB: "" };

          html += `
            <tr>
              <td>${slot.round}</td>
              <td>${minutesToTimeStr(slot.start)}</td>
              <td>${minutesToTimeStr(slot.end)}</td>
              <td class="court-${m.court}">${m.court}</td>
              <td>${m.teamA}</td>
              <td>${m.teamB}</td>
              <td>
                <select class="score-input adminOnly" id="RES_${id}">
                  <option value="">–</option>
                  <option value="A" ${r.scoreA == 2 ? "selected" : ""}>${m.teamA} vinner</option>
                  <option value="D" ${r.scoreA == 1 ? "selected" : ""}>Uavgjort</option>
                  <option value="B" ${r.scoreB == 2 ? "selected" : ""}>${m.teamB} vinner</option>
                </select>

                <span class="reset-btn adminOnly" onclick="resetResult('${id}'); location.reload();">X</span>
              </td>
            </tr>
          `;
        });
      });

      html += "</tbody></table>";
      document.getElementById("resultsContainer").innerHTML = html;
      
      // Apply admin restrictions to score inputs
      updateAdminVisibility();

      document.addEventListener("input", e => {
        if (!e.target.id.startsWith("RES_")) return;
        if (!isAdmin()) return;

        const id = e.target.id.replace("RES_", "");
        const value = e.target.value;

        let scoreA = 0, scoreB = 0;

        if (value === "A") { scoreA = 2; scoreB = 0; }
        if (value === "B") { scoreA = 0; scoreB = 2; }
        if (value === "D") { scoreA = 1; scoreB = 1; }

        registerResult(id, scoreA, scoreB);
        renderStandings(teams);
      });

      document.getElementById("sortStandings").addEventListener("change", () => {
        renderStandings(teams);
      });

      renderStandings(teams);
    })();

    document.getElementById("saveResultsBtn").addEventListener("click", () => {
      downloadJSON("resultater.json", matchResults);
    });

    document.getElementById("saveResultsGitHubBtn").addEventListener("click", async () => {
      if (!isAdmin()) return;

      const msgEl = document.getElementById("saveResultsGitHubMsg");
      const btn = document.getElementById("saveResultsGitHubBtn");

      const sourceCfg = getPublishedScheduleSource();
      const config = {
        owner: sourceCfg.owner,
        repo: sourceCfg.repo,
        branch: sourceCfg.branch,
        path: buildSiblingPath(sourceCfg.path, "resultater.json")
      };

      let token = localStorage.getItem("kanonball_github_publish_token") || "";
      if (!token) {
        token = (prompt("Skriv inn GitHub token for å publisere resultater:") || "").trim();
      }

      if (!token) {
        msgEl.style.color = "#c00";
        msgEl.textContent = "Mangler GitHub token.";
        return;
      }

      btn.disabled = true;
      msgEl.style.color = "#666";
      msgEl.textContent = "Publiserer resultater til GitHub...";

      try {
        await publishScheduleToGitHub(matchResults, config, token);
        msgEl.style.color = "green";
        msgEl.textContent = `Resultater publisert til ${config.owner}/${config.repo}:${config.path}`;
      } catch (err) {
        msgEl.style.color = "#c00";
        msgEl.textContent = err instanceof Error ? err.message : "Ukjent feil ved publisering av resultater.";
      } finally {
        btn.disabled = false;
        updateAdminVisibility();
      }
    });

    document.getElementById("resetAllBtn").addEventListener("click", () => {
      if (!confirm("Er du sikker på at du vil slette ALLE resultater? Dette kan ikke angres.")) {
        return;
      }

      matchResults = {};
      saveResults();
      alert("Alle resultater er slettet.");
      location.reload();
    });
  </script>
</body>
</html>
